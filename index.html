<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Será M.E.? - Triagem Interativa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between text-slate-800">

    <header class="bg-blue-600 text-white shadow-md p-4 text-center">
        <h1 class="text-xl font-bold tracking-wide flex justify-center items-center gap-2">
            <i class="fa-solid font-black fa-brain"></i> Será M.E.?
        </h1>
        <p class="text-xs text-blue-100 mt-1">Triagem rápida de suspeita de Morte Encefálica</p>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md border border-slate-100 transition-all duration-300">
            
            <div id="progress-bar-container" class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>

            <div id="app-content">
                </div>

        </div>
    </main>

    <footer class="bg-slate-100 text-center py-3 text-xs text-slate-500 border-t border-slate-200">
        Direcionado a profissionais de saúde. Baseado na Resolução CFM nº 2.173/17.
    </footer>

    <script>
        // Estrutura de dados dos passos do algoritmo
        const steps = {
    start: {
        title: "Escala de Coma",
        question: "O paciente pontua Glasgow 3 (ou 1 na escala de coma de Glasgow Pupilar) ou RASS -5?",
        yes: "q1", 
        no: "result_sedacao",
        progress: 20
    },
    q1: {
        title: "Nexo Causal e Imagem",
        question: "A causa do coma é conhecida E há exame de imagem (Tomografia/Ressonância) que comprove a lesão encefálica estrutural?",
        yes: "q2", // Avança direto para o exame físico se já tem imagem
        no: "result_imagem_urgente", // Se não tem imagem, para aqui e manda fazer
        progress: 40
    },
    q2: {
        title: "Coma Aperceptivo",
        question: "O coma é aperceptivo? (Ausência de resposta motora perceptível a estímulos externos dolorosos supraespinhais)",
        yes: "q3",
        no: "result_nao_coma",
        progress: 60
    },
    q3: {
        title: "Exame das Pupilas",
        question: "As pupilas estão fixas e arreativas (midriáticas ou médio-fixas)?",
        yes: "q5", // Vai direto para fatores de confusão
        no: "q4",  // Desvia para a exceção de tronco
        progress: 80
    },
    q4: {
        title: "Outros Reflexos de Tronco",
        question: "Apesar das pupilas, há ausência de outros reflexos (córneo-palpebral, oculocefálico, vestíbulo-coclear)?",
        yes: "result_notificar_opo", 
        no: "result_investigar",
        progress: 90
    },
    q5: {
        title: "Causas Tratáveis",
        question: "Foram excluídas hipotermia (Temp < 35°C), distúrbios metabólicos graves ou efeito de drogas depressoras do SNC?",
        yes: "result_abrir_protocolo", // Último passo positivo, vai direto pro resultado final!
        no: "result_corrigir",
        progress: 100
    },

    // --- TELAS DE DESTINO / RESULTADOS ATUALIZADAS ---
    result_sedacao: {
        isResult: true,
        type: "info",
        title: "Avaliar Sedação e Evolução",
        desc: "Paciente não atende a pontuação mínima de coma. Se houver uso de sedativos, aguarde o tempo de eliminação (washout) para reavaliação clínica. Se o GLASGOW clínico geral for menor que 7, NOTIFIQUE a e-DOT local.",
        actionText: "Reiniciar Triagem"
    },
    result_imagem_urgente: {
        isResult: true,
        type: "danger",
        title: "PROVIDENCIAR EXAME DE IMAGEM",
        desc: "A Morte Encefálica exige a comprovação documental da lesão estrutural. Providencie a Tomografia ou Ressonância imediatamente. Como o paciente está em coma grave, aproveite para NOTIFICAR a e-DOT local sobre o caso.",
        actionText: "Voltar para Início"
    },
    result_nao_coma: {
        isResult: true,
        type: "warning",
        title: "Coma Não Aperceptivo",
        desc: "Presença de reflexos ou respostas motoras coordenadas afasta o diagnóstico de M.E. Mantenha os cuidados intensivos. Se o GLASGOW geral for menor que 7, NOTIFIQUE a e-DOT local.",
        actionText: "Reiniciar Triagem"
    },
    result_notificar_opo: {
        isResult: true,
        type: "danger",
        title: "NOTIFICAR OPO IMEDIATAMENTE",
        desc: "O paciente apresenta assimetria ou particularidade pupilar, mas tem ausência dos outros reflexos de tronco e lesão comprovada por imagem. O quadro é gravíssimo e irreversível. *Notifique a OPO/e-DOT imediatamente*",
        actionText: "Novo Paciente"
    },
    result_investigar: {
        isResult: true,
        type: "info",
        title: "Investigar Quadro Neurológico",
        desc: "O quadro não aponta para M.E. e os reflexos de tronco preservados afastam a suspeita imediata para a OPO/e-DOT. Discuta a condução do caso com a neurologia ou neurocirurgia.",
        actionText: "Reiniciar"
    },
    result_corrigir: {
        isResult: true,
        type: "warning",
        title: "Corrigir Fatores de Confusão",
        desc: "Embora a clínica e a imagem apontem para M.E., o protocolo não pode ser aberto sob hipotermia ou efeito de sedativos. Aqueça o paciente (>35°C), aguarde o tempo de eliminação das drogas e reinicie a avaliação.",
        actionText: "Voltar para Início"
    },
    result_abrir_protocolo: {
        isResult: true,
        type: "success",
        title: "ABRIR PROTOCOLO + NOTIFICAR OPO/e-DOT",
        desc: "Todos os pré-requisitos clínicos, de imagem e de estabilidade fisiológica foram atingidos. *Notifique a OPO/e-DOT imediatamente* e *Inicie o Protocolo de Determinação de Morte Encefálica* conforme a legislação vigente.",
        actionText: "Novo Paciente"
    }
};

        let currentStep = "start";

        function renderStep(stepKey) {
            currentStep = stepKey;
            const step = steps[stepKey];
            const container = document.getElementById("app-content");
            const progressBar = document.getElementById("progress-bar");
            const progressBarContainer = document.getElementById("progress-bar-container");

            if (!step.isResult) {
                // Renderiza Pergunta
                progressBarContainer.style.display = "block";
                progressBar.style.width = `${step.progress}%`;

                container.innerHTML = `
                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase tracking-wider">${step.title}</span>
                    <h2 class="text-lg font-semibold text-slate-800 mt-3 mb-6 leading-snug">${step.question}</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="nextStep('${step.yes}')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 cursor-pointer text-center">
                            <i class="fa-solid fa-check mr-2"></i> SIM
                        </button>
                        <button onclick="nextStep('${step.no}')" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 cursor-pointer text-center">
                            <i class="fa-solid fa-xmark mr-2"></i> NÃO
                        </button>
                    </div>
                `;
            } else {
                // Renderiza Tela de Destino (Resultado)
                progressBarContainer.style.display = "none";
                
                let colorClass = "bg-blue-50 text-blue-800 border-blue-200";
                let icon = "fa-circle-info";

                if (step.type === "success") {
                    colorClass = "bg-emerald-50 text-emerald-900 border-emerald-200";
                    icon = "fa-circle-check text-emerald-600";
                } else if (step.type === "danger") {
                    colorClass = "bg-rose-50 text-rose-900 border-rose-200";
                    icon = "fa-triangle-exclamation text-rose-600";
                } else if (step.type === "warning") {
                    colorClass = "bg-amber-50 text-amber-900 border-amber-200";
                    icon = "fa-circle-exclamation text-amber-600";
                }

                container.innerHTML = `
                    <div class="border rounded-xl p-5 ${colorClass} mb-6 text-center">
                        <i class="fa-solid ${icon} text-3xl mb-3"></i>
                        <h2 class="text-xl font-bold mb-2 tracking-tight">${step.title}</h2>
                        <p class="text-sm leading-relaxed">${step.desc}</p>
                    </div>
                    <button onclick="nextStep('start')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 px-4 rounded-xl transition-all cursor-pointer text-center">
                        <i class="fa-solid fa-rotate-left mr-2"></i> ${step.actionText}
                    </button>
                `;
            }
        }

        function nextStep(nextKey) {
            renderStep(nextKey);
        }

        // Inicializa o app
        renderStep("start");
    </script>
</body>
</html>
