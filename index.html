<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Será M.E.? - Triagem Interativa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between text-slate-800">

    <header class="bg-blue-600 text-white shadow-md p-4 text-center">
        <h1 class="text-xl font-bold tracking-wide flex justify-center items-center gap-2">
            <i class="fa-solid font-black fa-brain"></i> Será M.E.?
        </h1>
        <p class="text-xs text-blue-100 mt-1">Triagem rápida de suspeita de Morte Encefálica</p>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md border border-slate-100 transition-all duration-300">
            
            <div id="progress-bar-container" class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>

            <div id="app-content">
                </div>

        </div>
    </main>

    <footer class="bg-slate-100 text-center py-3 text-xs text-slate-500 border-t border-slate-200">
        Direcionado a profissionais de saúde. Baseado na Resolução CFM nº 2.173/17.
    </footer>

    <script>
        // Estrutura de dados dos passos do algoritmo
        const steps = {
            start: {
                title: "Escala de Coma",
                question: "O paciente pontua Glasgow 3 (ou 1 na escala de coma de Glasgow Pupilar)?",
                yes: "q2",
                no: "result_sedacao",
                progress: 30
            },
            q1: {
                title: "Lesão Encefálica Conhecida",
                question: "O paciente apresenta uma lesão encefálica de causa conhecida, definida e irreversível?",
                yes: "q1",
                no: "result_nao_crit",
                progress: 15
            },
            q2: {
                title: "Coma Aperceptivo",
                question: "O coma é aperceptivo? (Ausência resposta motora perceptível a estímulos externos dolorosos supraespinhais)",
                yes: "q3",
                no: "result_nao_coma",
                progress: 45
            },
            q3: {
                title: "Exame das Pupilas",
                question: "As pupilas estão fixas e arreativas? (midriáticas ou médio fixas)?",
                yes: "q5", // vai direto para checar causas tratáveis
                no: "q4",  // trata a exceção
                progress: 60
            },
            q4: {
                title: "Outros Reflexos de Tronco",
                question: "Há ausência de outros reflexos (córneo-palpebral, oculocefálico, vestíbulo-coclear )?",
                yes: "result_notificar_opo", // Não preenche tudo pra ME mas é grave -> Notifica
                no: "result_investigar",
                progress: 75
            },
            q5: {
                title: "Causas Tratáveis",
                question: "Foram excluídas hipotermia (Temp < 35°C), distúrbios metabólicos graves ou efeito de drogas depressoras do SNC?",
                yes: "q6",
                no: "result_corrigir",
                progress: 90
            },
            q6: {
                title: "Exame de Imagem",
                question: "Há exame de imagem (Tomografia/Ressonância) recente que demonstre a lesão estrutural de forma clara?",
                yes: "result_abrir_protocolo",
                no: "result_imagem",
                progress: 100
            },

            // --- TELAS DE DESTINO / RESULTADOS ---
            result_nao_crit: {
                isResult: true,
                type: "warning",
                title: "Sem Critérios Clínicos no Momento",
                desc: "A Morte Encefálica exige uma lesão estrutural catastrófica conhecida. Continue o monitoramento neurocrítico regular do paciente + providencie exame de imagem! > NOTIFIQUE A e-DOT local.",
                actionText: "Reiniciar Triagem"
            },
            result_sedacao: {
                isResult: true,
                type: "info",
                title: "Avaliar Sedação e Evolução",
                desc: "Paciente não está em pontuação mínima. Se houver uso de sedativos, aguarde o tempo de eliminação (washout) para reavaliação clínica.",
                actionText: "Reiniciar Triagem"
            },
            result_nao_coma: {
                isResult: true,
                type: "warning",
                title: "Coma Não Aperceptivo",
                desc: "Presença de reflexos ou respostas motoras coordenadas afasta o diagnóstico de M.E. Mantenha os cuidados intensivos + se GLASGOW < 7 = NOTIFIQUE e-DOT local.",
                actionText: "Reiniciar Triagem"
            },
            result_notificar_opo: {
                isResult: true,
                type: "danger",
                title: "NOTIFICAR OPO IMEDIATAMENTE",
                desc: "O paciente pode não preencher estritamente todos os critérios clássicos de M.E., mas apresenta um quadro neurológico gravíssimo e irreversível. **Notifique a Organização de Procura de Órgãos (OPO)** como potencial doador.",
                actionText: "Novo Paciente"
            },
            result_investigar: {
                isResult: true,
                type: "info",
                title: "Investigar Assimetrias",
                desc: "O quadro não aponta para M.E. clara e faltam dados de gravidade imediata para a OPO. Discuta a condução com a neurologia/neurocirurgia.",
                actionText: "Reiniciar"
            },
            result_corrigir: {
                isResult: true,
                type: "warning",
                title: "Corrigir Fatores de Confusão",
                desc: "Protocolos de M.E. não podem ser abertos sob hipotermia ou efeito de sedativos. Aqueça o paciente (>35°C) e aguarde o tempo correto de eliminação das drogas.",
                actionText: "Voltar para Início"
            },
            result_imagem: {
                isResult: true,
                type: "danger",
                title: "REALIZAR EXAME DE IMAGEM",
                desc: "A suspeita clínica é fortíssima, mas é obrigatório ter a documentação da lesão por imagem. Providencie a Tomografia/Ressonância e, se confirmado o dano, notifique a e-DOT local e abra o protocolo.",
                actionText: "Voltar para Início"
            },
            result_abrir_protocolo: {
                isResult: true,
                type: "success",
                title: "ABRIR PROTOCOLO + NOTIFICAR OPO",
                desc: "Todos os pré-requisitos foram atingidos. **Iniciar o Protocolo de Determinação de Morte Encefálica** (exames clínicos + teste de apneia + exame complementar) e **Notifique a OPO imediatamente** conforme a legislação.",
                actionText: "Novo Paciente"
            }
        };

        let currentStep = "start";

        function renderStep(stepKey) {
            currentStep = stepKey;
            const step = steps[stepKey];
            const container = document.getElementById("app-content");
            const progressBar = document.getElementById("progress-bar");
            const progressBarContainer = document.getElementById("progress-bar-container");

            if (!step.isResult) {
                // Renderiza Pergunta
                progressBarContainer.style.display = "block";
                progressBar.style.width = `${step.progress}%`;

                container.innerHTML = `
                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase tracking-wider">${step.title}</span>
                    <h2 class="text-lg font-semibold text-slate-800 mt-3 mb-6 leading-snug">${step.question}</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="nextStep('${step.yes}')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 cursor-pointer text-center">
                            <i class="fa-solid fa-check mr-2"></i> SIM
                        </button>
                        <button onclick="nextStep('${step.no}')" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 cursor-pointer text-center">
                            <i class="fa-solid fa-xmark mr-2"></i> NÃO
                        </button>
                    </div>
                `;
            } else {
                // Renderiza Tela de Destino (Resultado)
                progressBarContainer.style.display = "none";
                
                let colorClass = "bg-blue-50 text-blue-800 border-blue-200";
                let icon = "fa-circle-info";

                if (step.type === "success") {
                    colorClass = "bg-emerald-50 text-emerald-900 border-emerald-200";
                    icon = "fa-circle-check text-emerald-600";
                } else if (step.type === "danger") {
                    colorClass = "bg-rose-50 text-rose-900 border-rose-200";
                    icon = "fa-triangle-exclamation text-rose-600";
                } else if (step.type === "warning") {
                    colorClass = "bg-amber-50 text-amber-900 border-amber-200";
                    icon = "fa-circle-exclamation text-amber-600";
                }

                container.innerHTML = `
                    <div class="border rounded-xl p-5 ${colorClass} mb-6 text-center">
                        <i class="fa-solid ${icon} text-3xl mb-3"></i>
                        <h2 class="text-xl font-bold mb-2 tracking-tight">${step.title}</h2>
                        <p class="text-sm leading-relaxed">${step.desc}</p>
                    </div>
                    <button onclick="nextStep('start')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 px-4 rounded-xl transition-all cursor-pointer text-center">
                        <i class="fa-solid fa-rotate-left mr-2"></i> ${step.actionText}
                    </button>
                `;
            }
        }

        function nextStep(nextKey) {
            renderStep(nextKey);
        }

        // Inicializa o app
        renderStep("start");
    </script>
</body>
</html>
